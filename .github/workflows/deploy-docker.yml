# Timeweb Container Registry (пример):
#   DOCKER_REG_DOMAIN = e27ca11f-inventive-grosbeak.registry.twcstorage.ru   (только хост, БЕЗ https://)
#   DOCKER_REG_USER   = e27ca11f-inventive-grosbeak
#   DOCKER_REG_TOKEN  = API-токен из панели Timeweb
# GitHub Container Registry:
#   DOCKER_REG_DOMAIN = ghcr.io
#   DOCKER_REG_USER   — можно не задавать (будет github.actor)
#   DOCKER_REG_TOKEN  = PAT с read:packages write:packages
#
# Образ: {host}/{user}/{имя-репо-на-github}:latest  (имя репо — последний сегмент, lower case)
name: Deploy Docker

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Registry host (обрезка https:// — иначе таймаут к несуществующему URL)
        id: reg
        env:
          RAW: ${{ secrets.DOCKER_REG_DOMAIN }}
        run: |
          H="$RAW"
          H="${H#https://}"
          H="${H#http://}"
          H="${H%%/*}"
          H="${H%/}"
          if [ -z "$H" ]; then
            echo "::error::DOCKER_REG_DOMAIN пустой. Укажи только хост (например xxx.registry.twcstorage.ru или ghcr.io)"
            exit 1
          fi
          echo "host=$H" >> "$GITHUB_OUTPUT"
          echo "Using registry host: $H"

      - name: Image name
        id: meta
        env:
          REG_HOST: ${{ steps.reg.outputs.host }}
          REG_USER_IN: ${{ secrets.DOCKER_REG_USER }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          USER=$(echo "${REG_USER_IN:-$GITHUB_ACTOR}" | tr '[:upper:]' '[:lower:]')
          SHORT=$(echo "$GITHUB_REPOSITORY" | cut -d/ -f2 | tr '[:upper:]' '[:lower:]')
          IMG="${REG_HOST}/${USER}/${SHORT}:latest"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"
          echo "Full image: $IMG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.reg.outputs.host }}
          username: ${{ secrets.DOCKER_REG_USER || github.actor }}
          password: ${{ secrets.DOCKER_REG_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          REG_HOST: ${{ steps.reg.outputs.host }}
          REG_TOKEN: ${{ secrets.DOCKER_REG_TOKEN }}
          REG_USER: ${{ secrets.DOCKER_REG_USER }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USER }}
          password: ${{ secrets.HOST_PASSWORD }}
          envs: IMAGE,REG_HOST,REG_TOKEN,REG_USER,GITHUB_ACTOR
          script: |
            set -e
            USERNAME=$(echo "${REG_USER:-$GITHUB_ACTOR}" | tr '[:upper:]' '[:lower:]')
            echo "$REG_TOKEN" | docker login "$REG_HOST" -u "$USERNAME" --password-stdin
            docker pull "$IMAGE"
            docker stop mtlab-landing 2>/dev/null || true
            docker rm mtlab-landing 2>/dev/null || true
            docker run -d \
              --name mtlab-landing \
              --restart unless-stopped \
              -p 127.0.0.1:3000:3000 \
              "$IMAGE"
