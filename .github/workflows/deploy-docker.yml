# Без registry: build на GHA → docker save → scp → docker load → run
# Secrets: HOST_IP, HOST_USER, HOST_PASSWORD
name: Deploy Docker

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: mtlab-landing:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image
        run: docker save mtlab-landing:latest | gzip > mtlab-landing.tar.gz

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USER }}
          password: ${{ secrets.HOST_PASSWORD }}
          source: mtlab-landing.tar.gz
          target: /tmp/

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USER }}
          password: ${{ secrets.HOST_PASSWORD }}
          script: |
            set -e
            gunzip -c /tmp/mtlab-landing.tar.gz | docker load
            rm -f /tmp/mtlab-landing.tar.gz
            docker stop mtlab-landing 2>/dev/null || true
            docker rm mtlab-landing 2>/dev/null || true
            docker run -d \
              --name mtlab-landing \
              --restart unless-stopped \
              -p 127.0.0.1:3000:3000 \
              mtlab-landing:latest
